name: kolichka
description: "Количка — сравни цени на хранителни продукти около теб"
# Prevent accidental publishing to pub.dev.
publish_to: 'none'
version: 1.4.2+10

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  collection: ^1.18.0
  in_app_review: ^2.0.9
  package_info_plus: ^8.0.2
  share_plus: ^10.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
flutter_launcher_icons:
  ios: true
  android: true
  image_path_ios: "assets/icons/app_icon.png"
  image_path_android: "assets/icons/app_icon.png"
